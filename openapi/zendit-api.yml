openapi: 3.0.3
info:
  title: Zendit API
  description: >-
    The Zendit API provides programmatic access to a global prepaid ecosystem,
    enabling mobile credit top-ups, data packages, digital gift cards, prepaid
    utility bill payments, and eSIM products through a unified integration.
  version: '1.0.0'
  x-generated-from: documentation
  x-source-url: https://developers.zendit.io/api/
  contact:
    name: Zendit
    url: https://zendit.io
servers:
  - url: https://api.zendit.io/v1
    description: Zendit Production
tags:
  - name: Account
    description: Wallet balance and account information
  - name: Brands
    description: Brand catalog
  - name: Mobile Top-Up
    description: Mobile credit top-ups, bundles, and data plans
  - name: eSIM
    description: eSIM plans and activation
  - name: Vouchers
    description: Digital gift cards and utility bill payments
  - name: Transactions
    description: Cross-product transaction queries
  - name: Tools
    description: Utility endpoints
  - name: Reports
    description: Transaction reporting
paths:
  /balance:
    get:
      operationId: getBalance
      summary: Zendit Get Balance
      description: Retrieve wallet balance and currency information.
      tags: [Account]
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'
              examples:
                GetBalance200Example:
                  summary: Default getBalance 200 response
                  x-microcks-default: true
                  value:
                    amount: 1234.56
                    currency: USD
                    accountId: acc-12345
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GetBalance401Example:
                  summary: Default getBalance 401 response
                  x-microcks-default: true
                  value:
                    code: INVALID_REQUEST
                    description: The request is missing required parameter offerId.
                    message: offerId is required.
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /brands:
    get:
      operationId: listBrands
      summary: Zendit List Brands
      description: List available brands with pagination and optional country filtering.
      tags: [Brands]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Country'
      responses:
        '200':
          description: List of brands
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandList'
              examples:
                ListBrands200Example:
                  summary: Default listBrands 200 response
                  x-microcks-default: true
                  value:
                    list: &id005
                      - {}
                    offset: 0
                    limit: 100
                    total: 250
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /brands/{brand}:
    get:
      operationId: getBrand
      summary: Zendit Get Brand
      description: Get brand details, logos, and metadata.
      tags: [Brands]
      parameters:
        - name: brand
          in: path
          required: true
          schema:
            type: string
          example: rebel-prepaid
      responses:
        '200':
          description: Brand detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
              examples:
                GetBrand200Example:
                  summary: Default getBrand 200 response
                  x-microcks-default: true
                  value:
                    id: rebel-prepaid
                    name: Rebel Prepaid
                    country: US
                    logoUrl: https://cdn.zendit.io/logos/rebel.png
                    types: &id004 [Mobile Top Up, Bundle]
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /brands/{brand}/redemptionInstructions:
    get:
      operationId: getBrandRedemptionInstructions
      summary: Zendit Get Brand Redemption Instructions
      description: Fetch redemption terms and conditions by delivery type.
      tags: [Brands]
      parameters:
        - name: brand
          in: path
          required: true
          schema:
            type: string
          example: example-value
      responses:
        '200':
          description: Redemption instructions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionInstructions'
              examples:
                GetBrandRedemptionInstructions200Example:
                  summary: Default getBrandRedemptionInstructions 200 response
                  x-microcks-default: true
                  value:
                    deliveryType: SMS
                    instructions: Dial *123# from your phone to redeem.
                    termsAndConditions: Valid for 30 days from purchase.
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /topups/offers:
    get:
      operationId: listTopupOffers
      summary: Zendit List Topup Offers
      description: List top-up, bundle, and data offers with filters.
      tags: [Mobile Top-Up]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Country'
        - name: brand
          in: query
          schema:
            type: string
          example: example-value
        - name: subType
          in: query
          schema:
            type: string
            enum: [Mobile Top Up, Bundle, Data]
          example: Mobile Top Up
      responses:
        '200':
          description: List of offers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferList'
              examples:
                ListTopupOffers200Example:
                  summary: Default listTopupOffers 200 response
                  x-microcks-default: true
                  value:
                    list: &id002
                      - {}
                    offset: 0
                    limit: 100
                    total: 1500
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /topups/offers/{offerId}:
    get:
      operationId: getTopupOffer
      summary: Zendit Get Topup Offer
      description: Retrieve specific top-up offer details.
      tags: [Mobile Top-Up]
      parameters:
        - $ref: '#/components/parameters/OfferId'
      responses:
        '200':
          description: Offer detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
              examples:
                GetTopupOffer200Example:
                  summary: Default getTopupOffer 200 response
                  x-microcks-default: true
                  value:
                    offerId: offer-12345
                    name: Rebel Prepaid 10 USD
                    brand: rebel-prepaid
                    country: US
                    type: TOPUP
                    subType: Mobile Top Up
                    price:
                      amount: {}
                      currency: {}
                    send:
                      amount: {}
                      currency: {}
                    receive:
                      amount: {}
                      currency: {}
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /topups/purchases:
    get:
      operationId: listTopupPurchases
      summary: Zendit List Topup Purchases
      description: Query top-up transactions with date and status filters.
      tags: [Mobile Top-Up]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Status'
      responses:
        '200':
          description: List of purchases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseList'
              examples:
                ListTopupPurchases200Example:
                  summary: Default listTopupPurchases 200 response
                  x-microcks-default: true
                  value:
                    list: &id003
                      - {}
                    offset: 0
                    limit: 100
                    total: 50
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createTopupPurchase
      summary: Zendit Create Topup Purchase
      description: Create new top-up transaction.
      tags: [Mobile Top-Up]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopupPurchaseRequest'
            examples:
              CreateTopupPurchaseRequestExample:
                summary: Default createTopupPurchase request
                x-microcks-default: true
                value:
                  transactionId: my-txn-abc123
                  offerId: offer-12345
                  subscriberNumber: '+15555550100'
                  sendValue:
                    amount: {}
                    currency: {}
      responses:
        '201':
          description: Purchase created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Purchase'
              examples:
                CreateTopupPurchase201Example:
                  summary: Default createTopupPurchase 201 response
                  x-microcks-default: true
                  value:
                    transactionId: txn-abc123
                    offerId: offer-12345
                    status: DONE
                    type: TOPUP
                    createdAt: '2026-05-01T12:00:00Z'
                    send:
                      amount: {}
                      currency: {}
                    receive:
                      amount: {}
                      currency: {}
                    details: &id001 {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                CreateTopupPurchase400Example:
                  summary: Default createTopupPurchase 400 response
                  x-microcks-default: true
                  value:
                    code: INVALID_REQUEST
                    description: The request is missing required parameter offerId.
                    message: offerId is required.
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /topups/purchases/{transactionId}:
    get:
      operationId: getTopupPurchase
      summary: Zendit Get Topup Purchase
      description: Fetch top-up transaction status.
      tags: [Mobile Top-Up]
      parameters:
