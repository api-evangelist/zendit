                        timestamp: '2026-05-01T12:00:00Z'
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tools/phonenumberlookup/{msisdn}:
    get:
      operationId: lookupPhoneNumber
      summary: Zendit Lookup Phone Number
      description: Identify carrier from phone number in E.164 format. BETA endpoint.
      tags: [Tools]
      parameters:
        - name: msisdn
          in: path
          required: true
          schema:
            type: string
          example: '+15555550100'
      responses:
        '200':
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneLookup'
              examples:
                LookupPhoneNumber200Example:
                  summary: Default lookupPhoneNumber 200 response
                  x-microcks-default: true
                  value:
                    msisdn: '+15555550100'
                    country: US
                    carrier: Example Mobile
                    brand: rebel-prepaid
                    type: MOBILE
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /reports:
    post:
      operationId: createReport
      summary: Zendit Create Report
      description: Generate transaction report (CSV) asynchronously.
      tags: [Reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
            examples:
              CreateReportRequestExample:
                summary: Default createReport request
                x-microcks-default: true
                value:
                  dateFrom: '2026-04-01'
                  dateTo: '2026-04-30'
                  type: TRANSACTIONS
      responses:
        '202':
          description: Report job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
              examples:
                CreateReport202Example:
                  summary: Default createReport 202 response
                  x-microcks-default: true
                  value:
                    reportId: report-abc123
                    status: READY
                    downloadUrl: https://api.zendit.io/v1/reports/report-abc123/download
                    createdAt: '2026-05-01T12:00:00Z'
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /reports/{reportId}:
    get:
      operationId: getReport
      summary: Zendit Get Report
      description: Check report generation status.
      tags: [Reports]
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: '500123'
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
              examples:
                GetReport200Example:
                  summary: Default getReport 200 response
                  x-microcks-default: true
                  value:
                    reportId: report-abc123
                    status: READY
                    downloadUrl: https://api.zendit.io/v1/reports/report-abc123/download
                    createdAt: '2026-05-01T12:00:00Z'
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /reports/{reportId}/download:
    get:
      operationId: downloadReport
      summary: Zendit Download Report
      description: Download completed report file (CSV).
      tags: [Reports]
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: '500123'
      responses:
        '200':
          description: CSV report file
          content:
            text/csv:
              schema:
                type: string
                format: binary
      security:
        - BearerAuth: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: Bearer token authentication using your Zendit API key.
  parameters:
    Limit:
      name: _limit
      in: query
      required: true
      description: Items per page (1-1024).
      schema:
        type: integer
        minimum: 1
        maximum: 1024
        default: 100
      example: 100
    Offset:
      name: _offset
      in: query
      required: true
      description: Pagination offset.
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    Country:
      name: country
      in: query
      description: Two-letter ISO country code.
      schema:
        type: string
        minLength: 2
        maxLength: 2
      example: US
    Status:
      name: status
      in: query
      description: Transaction status filter.
      schema:
        type: string
        enum: [DONE, FAILED, PENDING, ACCEPTED, AUTHORIZED, IN_PROGRESS]
      example: DONE
    OfferId:
      name: offerId
      in: path
      required: true
      description: Offer identifier.
      schema:
        type: string
      example: offer-12345
    TransactionId:
      name: transactionId
      in: path
      required: true
      description: Transaction identifier.
      schema:
        type: string
      example: txn-abc123
  schemas:
    Balance:
      type: object
      description: Wallet balance and currency information.
      properties:
        amount:
          type: number
          description: Available balance amount.
          example: 1234.56
        currency:
          type: string
          description: ISO 4217 currency code.
          example: USD
        accountId:
          type: string
          description: Account identifier.
          example: acc-12345
    Brand:
      type: object
      description: Brand catalog entry.
      properties:
        id:
          type: string
          description: Brand identifier.
          example: rebel-prepaid
        name:
          type: string
          description: Brand name.
          example: Rebel Prepaid
        country:
          type: string
          description: Country code.
          example: US
        logoUrl:
          type: string
          format: uri
          description: Brand logo URL.
          example: https://cdn.zendit.io/logos/rebel.png
        types:
          type: array
          description: Product types offered.
          items:
            type: string
          example: *id004
    BrandList:
      type: object
      description: Paginated brand list.
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Brand'
          example: *id005
        offset:
          type: integer
          example: 0
        limit:
          type: integer
          example: 100
        total:
          type: integer
          example: 250
    RedemptionInstructions:
      type: object
      description: Brand redemption terms by delivery type.
      properties:
        deliveryType:
          type: string
          example: SMS
        instructions:
          type: string
          example: Dial *123# from your phone to redeem.
        termsAndConditions:
          type: string
          example: Valid for 30 days from purchase.
    Offer:
      type: object
      description: Product offer (top-up, eSIM, voucher).
      properties:
        offerId:
          type: string
          description: Unique offer identifier.
          example: offer-12345
        name:
          type: string
          description: Offer display name.
          example: Rebel Prepaid 10 USD
        brand:
          type: string
          description: Brand identifier.
          example: rebel-prepaid
        country:
          type: string
          description: Country code.
          example: US
        type:
          type: string
          description: Offer type.
          example: TOPUP
        subType:
          type: string
          description: Offer sub-type.
          example: Mobile Top Up
        price:
          $ref: '#/components/schemas/Price'
        send:
          $ref: '#/components/schemas/Price'
        receive:
          $ref: '#/components/schemas/Price'
    OfferList:
      type: object
      description: Paginated offer list.
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
          example: *id002
        offset:
          type: integer
          example: 0
        limit:
          type: integer
          example: 100
        total:
          type: integer
          example: 1500
    Price:
      type: object
      description: Monetary amount with currency.
      properties:
        amount:
          type: number
          example: 10.00
        currency:
          type: string
          example: USD
    TopupPurchaseRequest:
      type: object
      description: Top-up purchase request.
      required:
        - offerId
        - subscriberNumber
      properties:
        transactionId:
          type: string
          description: Client-provided idempotency key.
          example: my-txn-abc123
        offerId:
          type: string
          description: Offer to purchase.
          example: offer-12345
        subscriberNumber:
          type: string
          description: Recipient phone number in E.164 format.
          example: '+15555550100'
        sendValue:
          $ref: '#/components/schemas/Price'
    EsimPurchaseRequest:
      type: object
      description: eSIM purchase request.
      required:
        - offerId
      properties:
        transactionId:
          type: string
          example: my-txn-abc123
        offerId:
          type: string
          example: esim-offer-001
        iccId:
          type: string
          description: ICC ID of existing eSIM (for adding plan to existing eSIM).
          example: '8901260000000000001'
    VoucherPurchaseRequest:
      type: object
      description: Voucher purchase request.
      required:
        - offerId
      properties:
        transactionId:
          type: string
          example: my-txn-abc123
        offerId:
          type: string
          example: voucher-offer-001
        sendValue:
          $ref: '#/components/schemas/Price'
        recipient:
          type: object
          description: Recipient details.
          properties:
            email:
              type: string
              format: email
              example: recipient@example.com
            firstName:
              type: string
              example: Jane
            lastName:
              type: string
              example: Smith
          example: *id006
    Purchase:
      type: object
      description: Purchase transaction.
      properties:
        transactionId:
          type: string
          example: txn-abc123
        offerId:
          type: string
          example: offer-12345
        status:
          type: string
          enum: [DONE, FAILED, PENDING, ACCEPTED, AUTHORIZED, IN_PROGRESS]
          example: DONE
        type:
          type: string
          example: TOPUP
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T12:00:00Z'
        send:
          $ref: '#/components/schemas/Price'
        receive:
          $ref: '#/components/schemas/Price'
        details:
          type: object
          additionalProperties: true
          description: Product-specific details (top-up subscriber, voucher recipient, eSIM activation code, etc).
          example: *id001
    PurchaseList:
      type: object
      description: Paginated purchase list.
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Purchase'
          example: *id003
        offset:
          type: integer
          example: 0
        limit:
          type: integer
          example: 100
        total:
          type: integer
          example: 50
    Transaction:
      type: object
      description: Transaction with history log.
      properties:
        transactionId:
          type: string
          example: txn-abc123
        type:
          type: string
          example: TOPUP
        status:
          type: string
          example: DONE
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T12:00:00Z'
        history:
          type: array
          description: Transaction status history.
          items:
            type: object
            properties:
              status:
                type: string
                example: PENDING
              timestamp:
                type: string
                format: date-time
                example: '2026-05-01T12:00:00Z'
          example: *id007
    TransactionList:
      type: object
      description: Paginated transaction list.
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
          example: *id008
        offset:
          type: integer
          example: 100
        limit:
          type: integer
          example: 100
        total:
          type: integer
          example: 100
    EsimPlan:
      type: object
      description: Active or queued eSIM plan.
      properties:
        planId:
          type: string
          example: plan-abc123
        status:
          type: string
          example: ACTIVE
        dataUsed:
          type: number
          description: Data used in MB.
          example: 1024.5
        dataTotal:
          type: number
          description: Total data in MB.
          example: 5120.0
        validUntil:
          type: string
          format: date-time
          example: '2026-06-01T00:00:00Z'
    EsimPlanList:
      type: object
      description: List of eSIM plans for an ICC ID.
      properties:
        iccId:
          type: string
          example: '8901260000000000001'
        plans:
          type: array
          items:
            $ref: '#/components/schemas/EsimPlan'
          example: *id009
    Refund:
      type: object
      description: Refund status for an eSIM purchase.
      properties:
        transactionId:
          type: string
          example: '500123'
        refundId:
          type: string
          example: refund-abc123
        status:
          type: string
          enum: [REQUESTED, APPROVED, COMPLETED, REJECTED]
          example: APPROVED
        amount:
          $ref: '#/components/schemas/Price'
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T12:00:00Z'
    PhoneLookup:
      type: object
      description: Phone number carrier lookup result.
      properties:
        msisdn:
          type: string
          example: '+15555550100'
        country:
          type: string
          example: US
        carrier:
          type: string
          example: Example Mobile
        brand:
          type: string
          example: rebel-prepaid
        type:
          type: string
          example: MOBILE
    ReportRequest:
      type: object
      description: Asynchronous report generation request.
      required:
        - dateFrom
        - dateTo
      properties:
        dateFrom:
          type: string
          format: date
          example: '2026-04-01'
        dateTo:
          type: string
          format: date
          example: '2026-04-30'
        type:
          type: string
          enum: [TRANSACTIONS, BALANCE, COMMISSION]
          example: TRANSACTIONS
    Report:
      type: object
      description: Asynchronous report job.
      properties:
        reportId:
          type: string
          example: report-abc123
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, READY, FAILED]
          example: READY
        downloadUrl:
          type: string
          format: uri
          example: https://api.zendit.io/v1/reports/report-abc123/download
        createdAt:
          type: string
          format: date-time
          example: '2026-05-01T12:00:00Z'
    Error:
      type: object
      description: Error response.
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        description:
          type: string
          example: The request is missing required parameter offerId.
        message:
          type: string
          example: offerId is required.
