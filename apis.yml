    name: Zendit API
    description: >-
      The Zendit API provides programmatic access to the global prepaid ecosystem,
      enabling developers to offer mobile credit top-ups, data packages, digital
      gift cards, prepaid utility bill payments, and eSIM products. The platform
      supports self-onboarding, sandbox testing, and webhook notifications.
