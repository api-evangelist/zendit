        idempotent: true
      call: zendit-esim.getesimpurchase
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-get-esim-qr-code
      description: Zendit Get ESIM QR Code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-esim.getesimqrcode
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-get-esim-refund
      description: Zendit Get ESIM Refund
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-esim.getesimrefund
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-create-esim-refund
      description: Zendit Create ESIM Refund
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zendit-esim.createesimrefund
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-get-esim-plans
      description: Zendit Get ESIM Plans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-esim.getesimplans
      with:
        iccId: tools.iccId
      outputParameters:
      - type: object
        mapping: $.
