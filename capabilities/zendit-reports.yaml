naftiko: 1.0.0-alpha2
info:
  label: Zendit API — Reports
  description: 'Zendit API — Reports. 3 operations. Lead operation: Zendit Create Report. Self-contained Naftiko capability
    covering one Zendit business surface.'
  tags:
  - Zendit
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDIT_API_KEY: ZENDIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: zendit-reports
    baseUri: https://api.zendit.io/v1
    description: Zendit API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: reports
      path: /reports
      operations:
      - name: createreport
        method: POST
        description: Zendit Create Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: reports-reportId
      path: /reports/{reportId}
      operations:
      - name: getreport
        method: GET
        description: Zendit Get Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportId
          in: path
          type: string
          required: true
    - name: reports-reportId-download
      path: /reports/{reportId}/download
      operations:
      - name: downloadreport
        method: GET
        description: Zendit Download Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ZENDIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: zendit-reports-rest
    port: 8080
    description: REST adapter for Zendit API — Reports. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/reports
      name: reports
      description: REST surface for reports.
      operations:
      - method: POST
        name: createreport
        description: Zendit Create Report
        call: zendit-reports.createreport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{reportid}
      name: reports-reportid
      description: REST surface for reports-reportId.
      operations:
      - method: GET
        name: getreport
        description: Zendit Get Report
        call: zendit-reports.getreport
        with:
          reportId: rest.reportId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{reportid}/download
      name: reports-reportid-download
      description: REST surface for reports-reportId-download.
      operations:
      - method: GET
        name: downloadreport
        description: Zendit Download Report
        call: zendit-reports.downloadreport
        with:
          reportId: rest.reportId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zendit-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendit API — Reports. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendit-create-report
      description: Zendit Create Report
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: zendit-reports.createreport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-get-report
      description: Zendit Get Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-reports.getreport
      with:
        reportId: tools.reportId
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-download-report
      description: Zendit Download Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-reports.downloadreport
      with:
        reportId: tools.reportId
      outputParameters:
      - type: object
        mapping: $.
