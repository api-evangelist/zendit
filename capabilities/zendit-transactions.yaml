naftiko: 1.0.0-alpha2
info:
  label: Zendit API — Transactions
  description: 'Zendit API — Transactions. 2 operations. Lead operation: Zendit List Transactions. Self-contained Naftiko
    capability covering one Zendit business surface.'
  tags:
  - Zendit
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDIT_API_KEY: ZENDIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: zendit-transactions
    baseUri: https://api.zendit.io/v1
    description: Zendit API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: transactions
      path: /transactions
      operations:
      - name: listtransactions
        method: GET
        description: Zendit List Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: transactions-transactionId
      path: /transactions/{transactionId}
      operations:
      - name: gettransaction
        method: GET
        description: Zendit Get Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ZENDIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: zendit-transactions-rest
    port: 8080
    description: REST adapter for Zendit API — Transactions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/transactions
      name: transactions
      description: REST surface for transactions.
      operations:
      - method: GET
        name: listtransactions
        description: Zendit List Transactions
        call: zendit-transactions.listtransactions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/{transactionid}
      name: transactions-transactionid
      description: REST surface for transactions-transactionId.
      operations:
      - method: GET
        name: gettransaction
        description: Zendit Get Transaction
        call: zendit-transactions.gettransaction
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zendit-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendit API — Transactions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendit-list-transactions
      description: Zendit List Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-transactions.listtransactions
      outputParameters:
      - type: object
        mapping: $.
    - name: zendit-get-transaction
      description: Zendit Get Transaction
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-transactions.gettransaction
      outputParameters:
      - type: object
        mapping: $.
