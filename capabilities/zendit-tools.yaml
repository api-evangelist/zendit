naftiko: 1.0.0-alpha2
info:
  label: Zendit API — Tools
  description: 'Zendit API — Tools. 1 operations. Lead operation: Zendit Lookup Phone Number. Self-contained Naftiko capability
    covering one Zendit business surface.'
  tags:
  - Zendit
  - Tools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZENDIT_API_KEY: ZENDIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: zendit-tools
    baseUri: https://api.zendit.io/v1
    description: Zendit API — Tools business capability. Self-contained, no shared references.
    resources:
    - name: tools-phonenumberlookup-msisdn
      path: /tools/phonenumberlookup/{msisdn}
      operations:
      - name: lookupphonenumber
        method: GET
        description: Zendit Lookup Phone Number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: msisdn
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ZENDIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: zendit-tools-rest
    port: 8080
    description: REST adapter for Zendit API — Tools. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tools/phonenumberlookup/{msisdn}
      name: tools-phonenumberlookup-msisdn
      description: REST surface for tools-phonenumberlookup-msisdn.
      operations:
      - method: GET
        name: lookupphonenumber
        description: Zendit Lookup Phone Number
        call: zendit-tools.lookupphonenumber
        with:
          msisdn: rest.msisdn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zendit-tools-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zendit API — Tools. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: zendit-lookup-phone-number
      description: Zendit Lookup Phone Number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: zendit-tools.lookupphonenumber
      with:
        msisdn: tools.msisdn
      outputParameters:
      - type: object
        mapping: $.
